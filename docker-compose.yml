# Local development dependencies for RetailerDisplay.
# Brings up PostgreSQL (the RetailerDisplay DB) and MinIO (S3-compatible storage)
# so development never touches AWS. Run:  docker compose up -d
services:
  postgres:
    image: postgres:16
    container_name: retailerdisplay-postgres
    environment:
      POSTGRES_DB: RetailerDisplay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: retailerdisplay-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # web console
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  miniodata:
